<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>你该换工作，还是换活法？ · 心理测试</title>
<style>
  :root { --accent: #6B7F9E; --ink: #202124; --muted: #74777d; --bg: #f4f1eb; --card: #fff; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: var(--bg); color: var(--ink); line-height: 1.65;
         min-height: 100vh; display: flex; justify-content: center; }
  button { font: inherit; }
  .wrap { width: 100%; max-width: 480px; padding: 24px 22px 48px;
          display: flex; flex-direction: column; min-height: 100vh; }
  .screen { display: none; flex: 1; flex-direction: column; animation: fade .35s ease; }
  .screen.active { display: flex; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* 封面 */
  .cover { justify-content: center; gap: 19px; }
  .brand { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; }
  .cover-rule { width: 42px; height: 3px; border-radius: 3px; background: var(--accent); }
  .kicker { color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: 1.5px; }
  .cover h1 { max-width: 390px; font-size: clamp(31px, 8.5vw, 40px); font-weight: 850;
              line-height: 1.24; letter-spacing: -.8px; }
  .cover .hook { color: var(--muted); font-size: 16px; }
  .meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 4px 0; }
  .meta div { background: rgba(255,255,255,.72); border: 1px solid #e4dfd7;
              border-radius: 13px; padding: 12px 8px; text-align: center; }
  .meta strong { display: block; color: var(--accent); font-size: 18px; line-height: 1.25; }
  .meta span { color: var(--muted); font-size: 11px; }
  .deliverables { display: flex; flex-wrap: wrap; gap: 8px; }
  .deliverables span { border: 1px solid #d8d3cb; border-radius: 999px; padding: 6px 11px;
                       color: #575a60; background: rgba(255,255,255,.52); font-size: 12px; }
  .disclaimer { color: #aaa69f; font-size: 11px; text-align: center; }

  /* 进度 */
  .question { padding-top: 10px; }
  .question-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .progress { font-size: 13px; color: var(--muted); letter-spacing: .5px; }
  .remaining { color: #aaa69f; font-size: 12px; }
  .bar { height: 4px; background: #dfdad2; border-radius: 4px; margin-bottom: 34px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); width: 0; transition: width .35s ease; }

  /* 题目 */
  .q { font-size: 23px; font-weight: 760; line-height: 1.45; margin-bottom: 26px; }
  .opt { display: flex; gap: 12px; align-items: flex-start; width: 100%; text-align: left;
         background: var(--card); border: 1px solid #e6e1da; border-radius: 15px;
         padding: 16px 17px; margin-bottom: 12px; font-size: 15.5px; color: var(--ink);
         cursor: pointer; transition: transform .1s ease, border-color .2s ease, box-shadow .2s ease; }
  .opt b { flex: none; color: var(--accent); font-size: 13px; line-height: 1.9; }
  .opt:active { transform: scale(.98); border-color: var(--accent); }
  .opt:focus-visible, .btn:focus-visible, .retry:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

  /* 按钮 */
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 14px;
         padding: 16px; font-size: 17px; font-weight: 700; cursor: pointer; width: 100%;
         box-shadow: 0 9px 24px rgba(43,45,50,.11); }
  .btn:active { opacity: .9; }

  /* 结果 */
  .result { gap: 16px; padding-top: 6px; }
  .result .label { font-size: 11px; color: var(--muted); letter-spacing: 2.5px; font-weight: 700; }
  .result h2 { font-size: 29px; line-height: 1.35; font-weight: 820; color: var(--accent); }
  .result .summary { font-size: 16px; }
  .report-meta { color: var(--muted); font-size: 12px; }
  .section-title { font-size: 14px; font-weight: 750; margin-top: 6px; }
  .score-card { background: #202827; color: #fff; border-radius: 17px; padding: 17px; }
  .score-row + .score-row { margin-top: 13px; }
  .score-head { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 6px;
                color: #dfe5e3; font-size: 12px; }
  .score-head span:first-child { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .score-track { height: 6px; background: #4b5754; border-radius: 6px; overflow: hidden; }
  .score-track i { display: block; height: 100%; background: var(--accent); border-radius: inherit; }
  .dims { display: flex; flex-direction: column; gap: 10px; }
  .dim { display: grid; grid-template-columns: 26px 1fr; gap: 10px; background: var(--card);
         border-radius: 13px; padding: 14px 15px; font-size: 14px; }
  .dim b { color: var(--accent); font-size: 12px; padding-top: 2px; }
  .advice { font-size: 15px; color: var(--ink); background: var(--card);
            border-radius: 13px; padding: 15px 16px; border-left: 4px solid var(--accent); }
  .retry { background: none; border: none; color: var(--muted); font-size: 14px; margin-top: 10px; cursor: pointer; text-decoration: underline; }
  .foot { text-align: center; color: #aaa69f; font-size: 11px; margin-top: 12px; }
  @media (prefers-reduced-motion: reduce) {
    .screen, .bar > i, .opt { animation: none; transition: none; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const CONTENT = {"slug": "change-job-or-life", "title": "你该换工作，还是换活法？", "hook": "12道题，生成你的专属离职诊断报告", "accent": "#6B7F9E", "questions": [{"q": "周日晚上，你通常是什么状态？", "options": [{"text": "开始焦虑明天要面对的人或事，具体的", "scores": {"job": 2}}, {"text": "感到一种说不清的空洞——不是累，是麻", "scores": {"life": 2}}, {"text": "脑子停不下来，反复回想这周哪里没做好", "scores": {"mind": 2}}]}, {"q": "如果明天可以无条件辞职，你第一个念头是？", "options": [{"text": "终于可以离开这个环境/这个领导/这个方向了", "scores": {"job": 2}}, {"text": "我想要一种完全不同节奏的生活", "scores": {"life": 2}}, {"text": "先高兴一秒，然后马上担心：然后呢？", "scores": {"mind": 2}}, {"text": "不敢想，怕自己什么都不是", "scores": {"mind": 1, "life": 1}}]}, {"q": "你最羡慕的那种人，是哪种？", "options": [{"text": "在自己热爱的行业做事，钱也不少赚", "scores": {"job": 2}}, {"text": "时间自己掌控，生活节奏舒适，不卷", "scores": {"life": 2}}, {"text": "看上去很笃定，不被外界评价带着走", "scores": {"mind": 2}}]}, {"q": "你对现状最核心的不满，是？", "options": [{"text": "这份工作本身的内容/方向/天花板让我看不到未来", "scores": {"job": 3}}, {"text": "不是工作内容的问题，是它占据了我全部的时间和精力", "scores": {"life": 3}}, {"text": "其实条件还行，但我就是提不起劲、感觉不对劲", "scores": {"mind": 3}}]}, {"q": "如果换了工作，你觉得会发生什么？", "options": [{"text": "会好很多——我只是需要一个对的平台/方向", "scores": {"job": 2}}, {"text": "不一定，因为我根本不知道自己要的是什么生活", "scores": {"life": 2}}, {"text": "可能还是一样，换哪都带着自己那些焦虑", "scores": {"mind": 2}}]}, {"q": "过去半年，哪一类时刻最让你想离开？", "options": [{"text": "又一次被具体的人、规则或不合理的决定消耗", "scores": {"job": 2}}, {"text": "发现工作之外的自己，已经很久没有出现过了", "scores": {"life": 2}}, {"text": "明明没发生大事，却总觉得自己做得不够好", "scores": {"mind": 2}}]}, {"q": "如果完整休息一周，再想到回来上班，你会？", "options": [{"text": "体力恢复了，但一想到那个环境还是抗拒", "scores": {"job": 3}}, {"text": "休息时像活过来，上班后又迅速被榨干", "scores": {"life": 3}}, {"text": "休息也停不下来，依旧担心落后或做错", "scores": {"mind": 3}}]}, {"q": "朋友听你说近况，最可能提醒你什么？", "options": [{"text": "你每次吐槽都指向同一批人和同一套机制", "scores": {"job": 2}}, {"text": "你已经很久约不出来，也没有自己的生活了", "scores": {"life": 2}}, {"text": "你对自己太狠，换谁都会被这套标准累到", "scores": {"mind": 2}}]}, {"q": "哪一种改变，最能让你立刻松一口气？", "options": [{"text": "换一个更尊重专业、回报也更匹配的平台", "scores": {"job": 2}}, {"text": "下班真正下班，把时间还给身体和关系", "scores": {"life": 2}}, {"text": "不再把每次失误都解释成自己不够好", "scores": {"mind": 2}}]}, {"q": "下面哪种代价，你反而最能接受？", "options": [{"text": "重新适应，只要方向和环境是对的", "scores": {"job": 2}}, {"text": "少赚一点，只要每天还有精力生活", "scores": {"life": 2}}, {"text": "暂时没有答案，只要不再逼自己立刻证明什么", "scores": {"mind": 2}}]}, {"q": "你真正舍不得放下的，可能是什么？", "options": [{"text": "这里积累的人脉、经验和还没兑现的机会", "scores": {"job": 2}}, {"text": "稳定收入带来的安全感和现在的生活惯性", "scores": {"life": 2}}, {"text": "那个必须证明自己能扛住、不能失败的形象", "scores": {"mind": 2}}]}, {"q": "如果只做一个三个月的小实验，你更愿意？", "options": [{"text": "更新简历并认真聊几家公司，验证是不是平台错配", "scores": {"job": 3}}, {"text": "先重做作息和边界，看看生活恢复后还想不想走", "scores": {"life": 3}}, {"text": "记录焦虑触发点，必要时找专业支持处理内耗", "scores": {"mind": 3}}]}], "results": [{"id": "job", "name": "你该换的是工作", "summary": "你心里其实早就清楚问题在哪，只是一直没走。不是这件事本身不行，而是这个环境、这个方向、这份付出换来的回报，和你想要的那条线对不上。你还有劲，只是不愿意把劲使在这里——这不是状态问题，是选择问题。换一个对的地方，你会重新有欲望。", "dimensions": ["你的不满有具体的地址：领导的决策方式、薪资跟不上付出、行业本身的天花板——你说得出来，说明你看见的是真实的外部错配，不是情绪发泄。", "你现在大概已经半脱离了：事情还在做，心已经在算另一条路——留下来的理由，主要是还没找到、或者还没准备好，而不是真的觉得这里值得。"], "advice": "把你说得出「具体不满」的那几条写下来，它们其实就是你换工作的筛选标准。对着标准找方向，比「想清楚再动」更管用。"}, {"id": "life", "name": "你该换的是活法", "summary": "你的困局不只是这份工作，而是整个生活的形状。你感到空洞，不是因为工作内容太差，而是它把你的时间、精力、注意力全部占满，让你没有空间做一个「完整的人」。换一份工作，你还是会掉进同样的时间漩涡。真正需要重建的，是你每天醒来之后那些时间属于谁、你允许生活里有什么。", "dimensions": ["你羡慕的不是别人的职位，而是别人掌控自己时间的方式——这说明你渴望的是自主权，而非更好的工作内容。", "你感到的那种「麻木」和「说不清的空洞」，通常不是工作内容造成的，而是长期生活结构失衡后身体发出的信号。"], "advice": "先在日历上划出一块只属于自己的时间，哪怕一周两小时。结构改变了，感受才会跟着变。"}, {"id": "mind", "name": "你该换的是心态", "summary": "你带着一套很重的内在剧本：必须做到、不能出错、别人怎么看我、我够不够好。这套剧本让你在任何工作里都跑不轻快。不是现实有多糟，而是你看待自己处境的方式让你持续耗损。换工作不会带走这些声音，它们会跟你一起搬家。真正的出口，是学会和自己内心那个严苛的声音谈判。", "dimensions": ["你常常在「还算不错的条件」里感到莫名的不对劲——这种落差通常来自内心的比较框架或过高的预期设定，而非现实本身。", "你对辞职的第一反应不是解脱，而是立刻涌现新的担忧——这是焦虑的典型迁移模式，说明问题的根源在内部，不在外部。"], "advice": "试着把「我应该做到」换成「我可以尝试」。松一点点，不是认输，是给自己留出呼吸的空间。"}]};

(function () {
  const app = document.getElementById("app");
  document.documentElement.style.setProperty("--accent", CONTENT.accent);
  document.title = CONTENT.title;
  let qi = 0;
  const scores = {};
  CONTENT.results.forEach(r => { scores[r.id] = 0; });

  function screen(cls, inner) {
    const d = document.createElement("div");
    d.className = "screen active " + cls;
    d.innerHTML = inner;
    app.innerHTML = "";
    app.appendChild(d);
    window.scrollTo(0, 0);
    return d;
  }

  function showCover() {
    const minutes = Math.max(2, Math.ceil(CONTENT.questions.length / 4));
    const d = screen("cover", `
      <div class="brand">心渡测验馆 / TEST LAB</div>
      <div class="cover-rule"></div>
      <div class="kicker">专题测试 · 凭第一直觉作答</div>
      <h1>${CONTENT.title}</h1>
      <p class="hook">${CONTENT.hook}</p>
      <div class="meta">
        <div><strong>${CONTENT.questions.length}</strong><span>道定制题</span></div>
        <div><strong>${minutes} 分钟</strong><span>预计用时</span></div>
        <div><strong>${CONTENT.results.length}</strong><span>种结果倾向</span></div>
      </div>
      <div class="deliverables"><span>倾向分布</span><span>判断依据</span><span>行动建议</span></div>
      <button class="btn" id="start">开始测试</button>
      <p class="disclaimer">测试结果仅供自我探索，不构成职业或心理建议</p>
    `);
    d.querySelector("#start").onclick = () => { qi = 0; showQuestion(); };
  }

  function showQuestion() {
    const q = CONTENT.questions[qi];
    const pct = Math.round((qi + 1) / CONTENT.questions.length * 100);
    const opts = q.options.map((o, i) =>
      `<button class="opt" data-i="${i}"><b>${String.fromCharCode(65 + i)}</b><span>${o.text}</span></button>`).join("");
    const d = screen("question", `
      <div class="question-top">
        <div class="progress">第 ${qi + 1} / ${CONTENT.questions.length} 题</div>
        <div class="remaining">还剩 ${CONTENT.questions.length - qi - 1} 题</div>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="q">${q.q}</div>
      ${opts}
    `);
    d.querySelectorAll(".opt").forEach(btn => {
      btn.onclick = () => {
        const o = q.options[+btn.dataset.i];
        for (const k in o.scores) scores[k] += o.scores[k];
        qi++;
        if (qi < CONTENT.questions.length) showQuestion();
        else showResult();
      };
    });
  }

  function pickResult() {
    let best = CONTENT.results[0];
    let bestScore = scores[best.id];
    for (const r of CONTENT.results) {       // 顺序遍历，严格大于才替换 → 并列取靠前
      if (scores[r.id] > bestScore) { best = r; bestScore = scores[r.id]; }
    }
    return best;
  }

  function showResult() {
    const r = pickResult();
    const total = CONTENT.results.reduce((sum, item) => sum + scores[item.id], 0) || 1;
    const ranking = CONTENT.results.map(item => ({
      item,
      pct: Math.round(scores[item.id] / total * 100)
    })).sort((a, b) => b.pct - a.pct);
    const scoreBars = ranking.map(x => `
      <div class="score-row">
        <div class="score-head"><span>${x.item.name}</span><span>${x.pct}%</span></div>
        <div class="score-track"><i style="width:${x.pct}%"></i></div>
      </div>`).join("");
    const dims = r.dimensions.map((t, i) =>
      `<div class="dim"><b>0${i + 1}</b><span>${t}</span></div>`).join("");
    const d = screen("result", `
      <div class="label">YOUR PERSONAL REPORT</div>
      <h2>${r.name}</h2>
      <div class="report-meta">基于 ${CONTENT.questions.length} 道选择生成 · 你的专属测试报告</div>
      <p class="summary">${r.summary}</p>
      <div class="section-title">你的倾向分布</div>
      <div class="score-card">${scoreBars}</div>
      <div class="section-title">从你的选择里看到</div>
      <div class="dims">${dims}</div>
      <div class="section-title">给你的下一步建议</div>
      <div class="advice">${r.advice}</div>
      <button class="retry" id="retry">再测一次</button>
      <div class="foot">仅供自我探索参考 · 请结合真实处境判断</div>
    `);
    d.querySelector("#retry").onclick = () => {
      CONTENT.results.forEach(x => { scores[x.id] = 0; });
      showCover();
    };
  }

  showCover();
})();
</script>
</body>
</html>
